<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cloud -->
  <path d="M48 28a10 10 0 00-9.8-8 14 14 0 00-26.5 3A10 10 0 0014 42h34a10 10 0 000-14z" fill="url(#cloudGrad)" opacity="0.9"/>
  <!-- Rain drops -->
  <path d="M22 48l-2 6a2 2 0 004 0l-2-6z" fill="url(#dropGrad)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M32 46l-2 8a2 2 0 004 0l-2-8z" fill="url(#dropGrad)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M42 48l-2 6a2 2 0 004 0l-2-6z" fill="url(#dropGrad)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </path>
</svg>
